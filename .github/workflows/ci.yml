name: ci

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Clone Example_Code repo and copy .py files with folder structure using rsync
        run: |
          git clone --depth=1 https://github.com/AVDASI2/Example_Code.git temp_code
          mkdir -p docs/code
          echo "Listing all .py files found:"
          find temp_code -name "*.py"
          echo "Copying .py files with rsync..."
          rsync -av --include='*/' --include='*.py' --exclude='*' temp_code/ docs/code/
          echo "Copy done. Directory listing of docs/code:"
          ls -R docs/code
          rm -rf temp_code

      - uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV 

      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-

      - run: pip install mkdocs-material mkdocs-literate-nav mkdocs-glightbox

      - run: mkdocs gh-deploy --force
